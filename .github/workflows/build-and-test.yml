name: Build, Test & Package Android/Web

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from GitHub's UI

permissions:
  contents: write

jobs:
  lint-and-build-web:
    name: Lint & Build Web (React)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm ci || npm install

    - name: Run Linter
      run: npm run lint

    - name: Build Project
      run: npm run build

  build-android:
    name: Build & Sign Android Packages
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Set up Gradle Wrapper
      run: |
        cd android-app
        gradle wrapper --gradle-version 8.5

    - name: Grant Execute Permission to Gradlew
      run: chmod +x android-app/gradlew

    - name: Build Debug APK & Release Packages
      run: |
        cd android-app
        # Build Debug APK (For quick testing)
        ./gradlew assembleDebug
        # Build Release APK
        ./gradlew assembleRelease
        # Build Release AAB (Android App Bundle for Google Play Store upload)
        ./gradlew bundleRelease

    - name: Generate Auto-Signing Key & Sign Packages
      run: |
        # Generate a temporary release signing keystore
        keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias my-key-alias -storepass mysecretpassword123 -keypass mysecretpassword123 \
          -dname "CN=AppLock, OU=Production, O=AppLockTimerPro, L=Delhi, S=Delhi, C=IN"

        echo "Signing Release Android App Bundle (.aab)..."
        # Check and sign App Bundle (AAB)
        if [ -f "android-app/app/build/outputs/bundle/release/app-release-unsigned.aab" ]; then
          jarsigner -keystore my-release-key.jks -storepass mysecretpassword123 -keypass mysecretpassword123 \
            -signedjar android-app/app/build/outputs/bundle/release/app-release.aab \
            android-app/app/build/outputs/bundle/release/app-release-unsigned.aab my-key-alias
        elif [ -f "android-app/app/build/outputs/bundle/release/app-release.aab" ]; then
          jarsigner -keystore my-release-key.jks -storepass mysecretpassword123 -keypass mysecretpassword123 \
            android-app/app/build/outputs/bundle/release/app-release.aab my-key-alias
        fi

        echo "Signing Release APK (.apk)..."
        # Check and sign Release APK
        if [ -f "android-app/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          jarsigner -keystore my-release-key.jks -storepass mysecretpassword123 -keypass mysecretpassword123 \
            -signedjar android-app/app/build/outputs/apk/release/app-release.apk \
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk my-key-alias
        elif [ -f "android-app/app/build/outputs/apk/release/app-release.apk" ]; then
          jarsigner -keystore my-release-key.jks -storepass mysecretpassword123 -keypass mysecretpassword123 \
            android-app/app/build/outputs/apk/release/app-release.apk my-key-alias
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AppLockTimerPro-Debug-APK
        path: android-app/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Signed Release APK (For direct phone install)
      uses: actions/upload-artifact@v4
      with:
        name: AppLockTimerPro-Signed-Release-APK
        path: android-app/app/build/outputs/apk/release/app-release.apk

    - name: Upload Signed Release AAB (For Google Play Store upload)
      uses: actions/upload-artifact@v4
      with:
        name: AppLockTimerPro-Signed-Release-AAB
        path: android-app/app/build/outputs/bundle/release/app-release.aab

    - name: Create Automatic Release on GitHub
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        name: "Latest Android App Lock Build (Installs & Google Play Store)"
        body: |
          These are the latest compiled Android application files built automatically.
          
          - **Download `app-release.apk`**: For direct installation on your mobile phone (Google Play Store signed).
          - **Download `app-release.aab`**: This is the bundle you upload to the Google Play Console for Play Store release.
          - Built on: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }}
        draft: false
        prerelease: false
        files: |
          android-app/app/build/outputs/apk/release/app-release.apk
          android-app/app/build/outputs/bundle/release/app-release.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
